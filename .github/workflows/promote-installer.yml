# .github/workflows/promote-installer.yml
name: Promote Build (Reusable)

on:
  workflow_call:
    inputs:
      channel:
        description: "Build channel to promote (alpha, release)"
        required: true
        type: string
      version:
        description: "Version label for deployment path and release artifact search (e.g. 9.0.0)"
        required: true
        type: string
      comment:
        description: "Comment to record against the build in kbase (defaults to 'GitHub Actions run <run_id>')"
        required: false
        type: string
        default: ""
    secrets:
      SSH_HOST:
        required: false
      SSH_USERNAME:
        required: false
      SSH_PRIVATE_KEY:
        required: false
      KBASE_DB_HOST:
        required: false
      KBASE_DB_USER:
        required: false
      KBASE_DB_PASS:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      run_id: ${{ steps.artifact.outputs.run_id }}
      artifact_name: ${{ steps.artifact.outputs.name }}
      sha: ${{ steps.sha.outputs.value }}
      deploy_target: ${{ steps.deploy-target.outputs.value }}
    steps:
      - name: Resolve DEPLOY_TARGET
        id: deploy-target
        run: |
          # Repo-level overrides org-level if set
          REPO_LEVEL="${{ vars.DEPLOY_TARGET }}"
          ORG_LEVEL="${{ vars.ORG_DEPLOY_TARGET }}"

          if [ -n "$REPO_LEVEL" ]; then
            echo "Using repo-level DEPLOY_TARGET: $REPO_LEVEL"
            echo "value=$REPO_LEVEL" >> $GITHUB_OUTPUT
          elif [ -n "$ORG_LEVEL" ]; then
            echo "Using org-level ORG_DEPLOY_TARGET: $ORG_LEVEL"
            echo "value=$ORG_LEVEL" >> $GITHUB_OUTPUT
          else
            echo "No DEPLOY_TARGET set, defaulting to ftp"
            echo "value=ftp" >> $GITHUB_OUTPUT
          fi

      - name: Find artifact
        id: artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANNEL="${{ inputs.channel }}"

          if [ "$CHANNEL" = "alpha" ]; then
            PATTERN="-alpha-msi$"
          elif [ "$CHANNEL" = "beta" ]; then
            PATTERN="-beta-msi$"
          else
            VERSION_ESCAPED=$(echo "${{ inputs.version }}" | sed 's/\./\\./g')
            PATTERN="-${VERSION_ESCAPED}\\.[0-9]+-release-msi$"
          fi

          RESULT=$(gh api \
            "/repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            | jq --arg pattern "$PATTERN" \
            '[.artifacts[] | select(.name | test($pattern)) | select(.expired == false)] | first')

          if [ -z "$RESULT" ] || [ "$RESULT" = "null" ]; then
            echo "::error::No matching $CHANNEL artifact found"
            exit 1
          fi

          RUN_ID=$(echo "$RESULT" | jq -r '.workflow_run.id')
          ARTIFACT_NAME=$(echo "$RESULT" | jq -r '.name')
          echo "Found artifact: $ARTIFACT_NAME (run: $RUN_ID)"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Resolve commit SHA
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh run view ${{ steps.artifact.outputs.run_id }} \
            --repo ${{ github.repository }} \
            --json headSha --jq '.headSha')
          echo "value=$SHA" >> $GITHUB_OUTPUT

  promote-ftp:
    needs: resolve
    runs-on: [self-hosted, Windows, X64]
    permissions:
      actions: read
    if: needs.resolve.outputs.deploy_target == 'ftp' || needs.resolve.outputs.deploy_target == 'both'
    steps:
      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.resolve.outputs.artifact_name }}
          run-id: ${{ needs.resolve.outputs.run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./msi-drop

      - name: Deploy to FTP
        shell: bash
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          printf '%b' "$SSH_KEY" | tr -d '\r' > /tmp/deploy_key
          echo "Key line count: $(wc -l < /tmp/deploy_key)"
          echo "Key header: $(head -1 /tmp/deploy_key)"
          icacls "$(cygpath -w /tmp/deploy_key)" /inheritance:r /grant:r "$USERNAME:(R)"
          scp -v -i /tmp/deploy_key -o StrictHostKeyChecking=no -r ./msi-drop/* \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/ftp/sysnet-csharp/${{ inputs.version }}/${{ github.event.repository.name }}/${{ needs.resolve.outputs.run_id }}/
          rm /tmp/deploy_key

      - name: Register builds in kbase
        shell: bash
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$SSH_KEY" | tr -d '\r' > /tmp/deploy_key
          icacls "$(cygpath -w /tmp/deploy_key)" /inheritance:r /grant:r "$USERNAME:(R)"
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            '/usr/bin/php -r "
              date_default_timezone_set(\"Australia/Adelaide\");
              \$version = \"${{ inputs.version }}\";
              \$build   = \"${{ needs.resolve.outputs.run_id }}\";
              \$path    = \"${{ github.event.repository.name }}/${{ needs.resolve.outputs.run_id }}\";
              \$comment = \"${{ inputs.comment }}\" !== \"\" ? \"${{ inputs.comment }}\" : \"GitHub Actions run ${{ needs.resolve.outputs.run_id }}\";
              \$date    = date(\"Y-m-d H:i:s\");
              \$dir     = \"/ftp/sysnet-csharp/\" . \$version . \"/\" . \$path . \"/\";
              \$files   = glob(\$dir . \"*.msi\");
              if (empty(\$files)) { echo \"No MSI files found in \" . \$dir; exit(1); }
              try {
                \$conn = new PDO(\"mysql:host=${{ secrets.KBASE_DB_HOST }};dbname=kbase\", \"${{ secrets.KBASE_DB_USER }}\", \"${{ secrets.KBASE_DB_PASS }}\");
                \$conn->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);
                foreach (\$files as \$file) {
                  \$filename = basename(\$file);
                  \$chk = \$conn->prepare(\"SELECT id FROM jenkins_apps WHERE name=? AND version_number=? AND build_number=?\");
                  \$chk->execute([\$filename, \$version, \$build]);
                  \$row = \$chk->fetch();
                  if (\$row) {
                    \$upd = \$conn->prepare(\"UPDATE jenkins_apps SET comment=? WHERE id=?\");
                    \$upd->execute([\$comment, \$row[\"id\"]]);
                    echo \"Updated: \" . \$filename . PHP_EOL;
                  } else {
                    \$ins = \$conn->prepare(\"INSERT INTO jenkins_apps (name,version_number,build_number,build_date,comment,path) VALUES (?,?,?,?,?,?)\");
                    \$ins->execute([\$filename,\$version,\$build,\$date,\$comment,\$path]);
                    echo \"Inserted: \" . \$filename . PHP_EOL;
                  }
                }
              } catch(PDOException \$e) { echo \$e->getMessage(); exit(1); }
            "'
          rm /tmp/deploy_key

  promote-s3:
    needs: resolve
    runs-on: ubuntu-latest
    permissions:
      actions: read
    if: needs.resolve.outputs.deploy_target == 's3' || needs.resolve.outputs.deploy_target == 'both'
    steps:
      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.resolve.outputs.artifact_name }}
          run-id: ${{ needs.resolve.outputs.run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./msi-drop

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 cp ./msi-drop/ \
            s3://${{ vars.DEPLOY_BUCKET }}/promoted/${{ inputs.version }}/${{ github.event.repository.name }}/${{ needs.resolve.outputs.run_id }}/ \
            --recursive \
            --exclude "*" \
            --include "*.msi"

  tag:
    needs: [resolve, promote-ftp, promote-s3]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >-
      always() && !failure() && !cancelled() &&
      (needs.promote-ftp.result == 'success' || needs.promote-s3.result == 'success')
    steps:
      - name: Tag promoted commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method POST \
            /repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/promoted/${{ inputs.version }}/${{ needs.resolve.outputs.run_id }}" \
            -f sha="${{ needs.resolve.outputs.sha }}"
